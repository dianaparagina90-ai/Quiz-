<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./layout/style.css">
    <script src="./script/script.js" defer></script>
    <title>Quiz</title>
</head>
<body>
    <section id="startSection">
        <h1>Välkommen till det galna quizet!</h1>
        <button id="startBtn">Starta quizet</button>
    </section>
    <div id="resetBtnContainer">
        <button id="resetBtn">Återställ quizet</button>
    </div>
    <section>
        <h2 id="question"></h2>
        <div id="answers"></div>
        <p id="result"></p>
        <p id="score">Score: <span id="scoreValue">0</span></p>
        <button id="nextbutton">Nästa</button> 
    </section>

</body>
</html>
